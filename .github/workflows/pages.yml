name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install --quiet -e .

      - name: Generate the static demo report
        run: |
          mkdir -p site
          python - <<'PY'
          import html, json, sys
          sys.path.insert(0, "src")
          from m365_agents_example.agent import Agent, Conversation

          SCENARIOS = [
              ("teams", "alice", "What's my next meeting?"),
              ("teams", "alice", "Who is Sarah Chen?"),
              ("outlook", "bob", "What's our policy on data residency?"),
              ("copilot-canvas", "carol", "Show me Copilot adoption status."),
              ("teams", "dan", "I'm stuck, can you escalate?"),
              ("teams", "eve", "Sing me a song."),
          ]

          agent = Agent()
          turns = []
          convos = {}
          for channel, user, msg in SCENARIOS:
              key = (channel, user)
              if key not in convos:
                  convos[key] = Conversation(user_id=user, channel=channel)
              r = agent.on_message(convos[key], msg)
              turns.append({"channel": channel, "user": user, "message": msg, "rendered": r})

          def channel_badge(ch):
              palette = {"teams": "#6264a7", "outlook": "#0078d4",
                         "copilot-canvas": "#1e8e3e"}
              return f'<span class="badge" style="background:{palette.get(ch, "#444")}">{html.escape(ch)}</span>'

          def card(turn):
              r = turn["rendered"]
              if r["shape"] == "email":
                  payload_html = r["body_html"]
                  payload_label = "Email body (HTML)"
              elif r["shape"] == "adaptive_card":
                  payload_html = f'<pre>{html.escape(json.dumps(r["card"], indent=2))}</pre>'
                  payload_label = "Adaptive card payload"
              else:
                  payload_html = f'<pre>{html.escape(r["text"])}</pre>'
                  payload_label = "Chat message"

              cites = ""
              if r.get("citations"):
                  cites = '<div class="kicker">Citations</div>'
                  cites += '<div class="tool-name"><code>' + html.escape(", ".join(r["citations"])) + '</code></div>'

              handoff = ""
              if r.get("handoff"):
                  handoff = '<div class="kicker handoff">Handoff to human</div>'
                  handoff += '<div class="tool-name"><code>' + html.escape(json.dumps(r["handoff"])) + '</code></div>'

              return f"""
                <div class="card">
                  <div class="card-header">
                    {channel_badge(turn["channel"])}
                    <span class="user">{html.escape(turn["user"])}</span>
                  </div>
                  <div class="kicker">Inbound activity</div>
                  <div class="question">{html.escape(turn["message"])}</div>
                  <div class="kicker">Intent matched</div>
                  <div class="tool-name"><code>{html.escape(r["intent"])}</code></div>
                  <div class="kicker">{html.escape(payload_label)}</div>
                  {payload_html}
                  {cites}
                  {handoff}
                </div>
              """

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>M365 Agents SDK example - live demo</title>
            <style>
              :root {{
                --primary: #0078d4; --accent: #0099bc;
                --bg: #f3f9fd; --border: #c7e0f4;
                --ink: #0a1929; --muted: #5b6e80;
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
                background: var(--bg); color: var(--ink); line-height: 1.5;
              }}
              .hero {{
                background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
                color: white; padding: 50px 24px 60px;
              }}
              .hero-inner {{ max-width: 900px; margin: 0 auto; }}
              .hero .kicker {{ font-size: 13px; letter-spacing: 2px; opacity: .75; text-transform: uppercase; }}
              .hero h1 {{ font-size: 38px; margin: 10px 0 14px; line-height: 1.1; }}
              .hero p {{ font-size: 17px; margin: 0; opacity: .92; max-width: 720px; }}
              .container {{ max-width: 900px; margin: -30px auto 60px; padding: 0 24px; }}
              .card {{
                background: white; border: 1px solid var(--border); border-radius: 12px;
                padding: 22px 26px; margin: 16px 0;
                box-shadow: 0 1px 3px rgba(0, 120, 212, .08);
              }}
              .card-header {{ display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }}
              .badge {{
                color: white; padding: 3px 10px; border-radius: 12px;
                font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
              }}
              .user {{ font-size: 13px; color: var(--muted); }}
              .kicker {{
                font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
                color: var(--muted); margin: 14px 0 4px; font-weight: 600;
              }}
              .kicker.handoff {{ color: #ad7400; }}
              .question {{ font-size: 17px; color: var(--ink); margin-bottom: 6px; }}
              .tool-name code {{
                background: #deecf9; padding: 4px 10px; border-radius: 6px;
                font-size: 13px; color: var(--primary); font-weight: 600;
                word-break: break-all;
              }}
              pre {{
                background: #0a1929; color: #c7e0f4; padding: 16px 18px;
                border-radius: 8px; overflow-x: auto; margin: 6px 0 0;
                font-family: Consolas, Menlo, monospace; font-size: 13px; line-height: 1.55;
                white-space: pre-wrap; word-wrap: break-word;
              }}
              .footer {{
                margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);
                color: var(--muted); font-size: 13px; text-align: center;
              }}
              .footer code {{ background: #deecf9; padding: 2px 6px; border-radius: 4px; }}
              a {{ color: var(--accent); }}
            </style>
          </head>
          <body>
            <div class="hero">
              <div class="hero-inner">
                <div class="kicker">Microsoft 365 Agents SDK</div>
                <h1>M365 Agents SDK example - live demo</h1>
                <p>Same agent, three M365 channels. Each card shows an inbound
                message, the intent the declarative manifest matched, and the
                channel-shaped response (Teams chat, Outlook HTML email, or
                Copilot canvas adaptive card). Default backend is the in-process
                stub - one env var swaps to the real SDK + Azure Bot Service.</p>
              </div>
            </div>

            <div class="container">
              {''.join(card(t) for t in turns)}

              <div class="footer">
                Regenerated on every push from the stub provider.
                Install: <code>pip install -e .</code> then <code>m365-agents-example</code>.<br>
                Source: <a href="https://github.com/derekgallardo01/m365-agents-sdk-example">github.com/derekgallardo01/m365-agents-sdk-example</a>
              </div>
            </div>
          </body>
          </html>
          """
          with open("site/index.html", "w", encoding="utf-8") as fh:
              fh.write(page)
          print("wrote site/index.html")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
